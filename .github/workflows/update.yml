name: update

# Bump data/sources.json to the latest official Claude Code release, pinned to
# Anthropic's own published checksums. Runs hourly and on manual dispatch.
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}

# Needed to push the bump commit back to the default branch.
permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Refresh data/sources.json
        # The #update app bundles curl + jq via writeShellApplication, so no
        # extra system deps are required here.
        run: nix run .#update

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- data/sources.json; then
            echo "sources.json unchanged, nothing to do."
            exit 0
          fi
          version="$(jq -r .version data/sources.json)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sources.json
          git commit -m "chore: bump Claude Code to ${version}"
          git push
